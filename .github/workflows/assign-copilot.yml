name: Assign Copilot to Issues

on:
  issues:
    types: [opened]

jobs:
  assign-copilot:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository (optional)
        uses: actions/checkout@v4

      - name: Assign Copilot using GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "Assigning Copilot to issue #${ISSUE_NUMBER}"
          gh issue edit "${ISSUE_NUMBER}" --add-assignee "@copilot"
